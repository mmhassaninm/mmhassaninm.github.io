<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalyst Technologies</title>
  <meta name="description" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <!-- NAVBAR -->
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="/">
        <span class="brand-square"></span>
        Catalyst
      </a>
      <ul class="nav-links" id="nav-links"></ul>
      <a href="#contact-form" class="btn btn-grad">Hire Me</a>
      <button class="nav-toggle" id="nav-toggle" aria-label="Menu">☰</button>
    </div>
  </nav>

  <!-- PAGE BODY (rendered dynamically) -->
  <main id="page-body">
    <div class="not-found">
      <p style="color: var(--muted);">Loading…</p>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div>© 2026 Catalyst Technologies</div>
      <a class="social-link" href="https://facebook.com" target="_blank" rel="noopener" aria-label="Facebook">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M9 8h-3v4h3v12h5V12h3.642L18 8h-4V6.333C14 5.378 14.192 5 15.115 5H18V0h-3.808C10.596 0 9 1.583 9 4.615V8z" fill="currentColor"/>
        </svg>
      </a>
    </div>
  </footer>

  <script src="/renderer.js"></script>
  <script>
    function pathToSlug(path) {
      const clean = String(path || '/').split('?')[0].split('#')[0];
      if (clean === '/' || clean === '') return 'home';
      return clean.replace(/^\/+|\/+$/g, '').toLowerCase();
    }

    async function loadAndRender() {
      const slug = pathToSlug(window.location.pathname);
      const body = document.getElementById('page-body');
      try {
        const res = await fetch(`/api/pages?slug=${encodeURIComponent(slug)}&status=published`);
        if (!res.ok) throw new Error('not found');
        const data = await res.json();
        if (!data.success || !data.page) throw new Error('not found');
        await window.CatalystRenderer.renderPage(data.page, body);
      } catch (err) {
        body.innerHTML = `
          <div class="not-found">
            <h1>404</h1>
            <p>This page does not exist or has not been published yet.</p>
            <a href="/" class="btn btn-grad btn-lg">Go Home</a>
          </div>`;
      }
    }

    async function loadNav() {
      try {
        const res = await fetch('/api/pages?status=published&nav=true');
        const data = await res.json();
        const pages = (data.pages || []).filter(p => !p.isHome);
        const navEl = document.getElementById('nav-links');
        const otherLinks = pages.map(p => `<li><a class="nav-link" href="/${encodeURIComponent(p.slug)}">${p.title.replace(/[<>]/g, '')}</a></li>`).join('');
        navEl.innerHTML = `
          <li><a class="nav-link" href="#about">About</a></li>
          <li><a class="nav-link" href="#services">Services</a></li>
          <li><a class="nav-link" href="#portfolio-grid">Work</a></li>
          <li><a class="nav-link" href="#contact-form">Contact</a></li>
          ${otherLinks}`;
      } catch (err) {
        document.getElementById('nav-links').innerHTML = `
          <li><a class="nav-link" href="#about">About</a></li>
          <li><a class="nav-link" href="#services">Services</a></li>
          <li><a class="nav-link" href="#portfolio-grid">Work</a></li>
          <li><a class="nav-link" href="#contact-form">Contact</a></li>`;
      }
    }

    document.getElementById('nav-toggle').addEventListener('click', () => {
      document.getElementById('nav-links').classList.toggle('open');
    });

    // Close mobile nav when a link is clicked
    document.getElementById('nav-links').addEventListener('click', (e) => {
      if (e.target.classList.contains('nav-link')) {
        document.getElementById('nav-links').classList.remove('open');
      }
    });

    loadNav();
    loadAndRender();
  </script>
</body>
</html>
