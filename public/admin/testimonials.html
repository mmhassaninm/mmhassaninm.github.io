<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catalyst CMS — Testimonials</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --sidebar-bg: #1a1a2e;
      --sidebar-hover: #22223b;
      --content-bg: #f9fafb;
      --accent: #95BF47;
      --accent-hover: #7ea438;
      --text-dark: #1f2937;
      --text-muted: #6b7280;
      --card-bg: #ffffff;
      --border-color: #e5e7eb;
      --danger: #ef4444;
      --success: #10b981;
      --warning: #f59e0b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', -apple-system, sans-serif; }
    body { background: var(--content-bg); color: var(--text-dark); min-height: 100vh; display: flex; }
    .sidebar { width: 260px; background: var(--sidebar-bg); color: #fff; height: 100vh; position: fixed; left: 0; top: 0; display: flex; flex-direction: column; z-index: 100; box-shadow: 4px 0 10px rgba(0,0,0,0.1); }
    .sidebar-brand { padding: 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .brand-logo { width: 36px; height: 36px; background: rgba(149,191,71,0.1); border: 1px solid var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .brand-name { font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #fff 40%, var(--accent) 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar-menu { list-style: none; padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; flex-grow: 1; overflow-y: auto; }
    .menu-item a { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: #9ca3af; text-decoration: none; border-radius: 10px; font-weight: 500; font-size: 15px; transition: all 0.2s; }
    .menu-item a:hover { background: var(--sidebar-hover); color: #fff; }
    .menu-item.active a { background: rgba(149,191,71,0.15); color: var(--accent); font-weight: 600; }
    .menu-icon { font-size: 18px; width: 24px; text-align: center; }
    .sidebar-footer { padding: 20px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
    .btn-logout { width: 100%; background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-logout:hover { background: var(--danger); color: #fff; }
    .main-content { margin-left: 260px; flex-grow: 1; padding: 40px; min-height: 100vh; }

    .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; }
    .header-bar h2 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
    .header-bar p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

    .btn { padding: 10px 18px; border-radius: 10px; font-weight: 600; font-size: 14px; cursor: pointer; border: none; font-family: inherit; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary { background: #fff; color: var(--text-dark); border: 1px solid var(--border-color); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: rgba(239,68,68,0.08); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }
    .btn-danger:hover { background: var(--danger); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    .table-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: #fafafa; }
    th { text-align: left; padding: 14px 18px; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border-color); }
    td { padding: 16px 18px; font-size: 14px; border-bottom: 1px solid var(--border-color); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafafa; }
    .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .pill.yes { background: rgba(16,185,129,0.15); color: var(--success); }
    .pill.no { background: rgba(107,114,128,0.12); color: var(--text-muted); }
    .stars { color: var(--warning); font-size: 14px; letter-spacing: 1px; }
    .quote { max-width: 320px; color: var(--text-muted); font-size: 13px; line-height: 1.5; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
    .actions-cell { display: flex; gap: 8px; justify-content: flex-end; }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; opacity: 0.4; margin-bottom: 12px; }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(15,23,42,0.55); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 500; padding: 20px; }
    .modal-backdrop.open { display: flex; }
    .modal { background: #fff; border-radius: 16px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.25); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; }
    .modal-header h3 { font-size: 18px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 24px; color: var(--text-muted); cursor: pointer; line-height: 1; }
    .modal-body { padding: 24px; }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border-color); display: flex; justify-content: flex-end; gap: 10px; }

    .form-field { margin-bottom: 16px; }
    .form-field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    .form-field input[type="text"], .form-field input[type="number"], .form-field textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 8px;
      font-size: 14px; font-family: inherit; background: #fff;
    }
    .form-field textarea { min-height: 100px; resize: vertical; }
    .form-field input:focus, .form-field textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(149,191,71,0.15);
    }
    .form-field.checkbox { display: flex; align-items: center; gap: 8px; }
    .form-field.checkbox input { width: auto; }
    .form-field.checkbox label { margin-bottom: 0; }
    .form-error { color: var(--danger); font-size: 13px; margin-bottom: 12px; display: none; }
    .form-error.show { display: block; }

    .toast { position: fixed; top: 24px; right: 24px; background: #1f2937; color: #fff; padding: 14px 20px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000; transform: translateY(-20px); opacity: 0; transition: all 0.3s; max-width: 360px; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { background: var(--danger); }
    .toast.success { background: var(--success); }

    .mobile-header { display: none; background: var(--sidebar-bg); color: #fff; padding: 16px 20px; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
    .btn-hamburger { background: transparent; border: none; color: #fff; font-size: 24px; cursor: pointer; }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.active { transform: translateX(0); }
      .main-content { margin-left: 0; padding: 100px 20px 40px; }
      .mobile-header { display: flex; }
      th, td { padding: 12px 10px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="mobile-header">
    <div class="sidebar-brand" style="border:none;padding:0;">
      <div class="brand-logo">🟢</div>
      <div class="brand-name">Catalyst</div>
    </div>
    <button class="btn-hamburger" id="hamburger-toggle">☰</button>
  </div>

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-logo">🟢</div>
      <div class="brand-name">Catalyst</div>
    </div>
    <ul class="sidebar-menu">
      <li class="menu-item"><a href="dashboard.html"><span class="menu-icon">📊</span><span>Dashboard</span></a></li>
      <li class="menu-item"><a href="pages.html"><span class="menu-icon">📄</span><span>Pages</span></a></li>
      <li class="menu-item"><a href="portfolio.html"><span class="menu-icon">💼</span><span>Portfolio</span></a></li>
      <li class="menu-item"><a href="services.html"><span class="menu-icon">🛠️</span><span>Services</span></a></li>
      <li class="menu-item"><a href="content.html"><span class="menu-icon">📝</span><span>Section Content</span></a></li>
      <li class="menu-item active"><a href="testimonials.html"><span class="menu-icon">⭐</span><span>Testimonials</span></a></li>
      <li class="menu-item"><a href="messages.html"><span class="menu-icon">📥</span><span>Inbox</span></a></li>
      <li class="menu-item"><a href="media.html"><span class="menu-icon">🖼️</span><span>Media Library</span></a></li>
      <li class="menu-item"><a href="settings.html"><span class="menu-icon">⚙️</span><span>Settings</span></a></li>
    </ul>
    <div class="sidebar-footer">
      <button class="btn-logout" id="btn-logout"><span>🚪</span><span>Sign Out</span></button>
    </div>
  </nav>

  <main class="main-content">
    <div class="header-bar">
      <div>
        <h2>Testimonials</h2>
        <p>Manage client testimonials</p>
      </div>
      <button class="btn btn-primary" id="btn-add">+ Add Testimonial</button>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>Client</th>
            <th>Company</th>
            <th>Quote</th>
            <th>Rating</th>
            <th>Featured</th>
            <th style="text-align:right;">Actions</th>
          </tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="6" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Add Testimonial</h3>
        <button class="modal-close" id="modal-close" aria-label="Close">×</button>
      </div>
      <form id="testimonial-form">
        <div class="modal-body">
          <div class="form-error" id="form-error"></div>
          <input type="hidden" id="f-id">
          <div class="form-field">
            <label for="f-clientName">Client Name *</label>
            <input type="text" id="f-clientName" required>
          </div>
          <div class="form-field">
            <label for="f-clientTitle">Client Title</label>
            <input type="text" id="f-clientTitle" placeholder="e.g. CTO, Marketing Director">
          </div>
          <div class="form-field">
            <label for="f-company">Company</label>
            <input type="text" id="f-company">
          </div>
          <div class="form-field">
            <label for="f-text">Testimonial Text *</label>
            <textarea id="f-text" required></textarea>
          </div>
          <div class="form-field">
            <label for="f-rating">Rating (1-5)</label>
            <input type="number" id="f-rating" min="1" max="5" step="1" value="5">
          </div>
          <div class="form-field checkbox">
            <input type="checkbox" id="f-featured">
            <label for="f-featured">Featured testimonial</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary" id="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) window.location.href = 'index.html';

    function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }
    function escapeHTML(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>'"]/g, t => ({ '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[t]));
    }
    function toast(msg, type = 'success') {
      const el = document.getElementById('toast');
      el.textContent = msg; el.className = `toast show ${type}`;
      setTimeout(() => el.classList.remove('show'), 2500);
    }
    function stars(n) {
      const r = Math.max(0, Math.min(5, Math.round(Number(n) || 0)));
      return '★'.repeat(r) + '<span style="color:var(--border-color)">' + '★'.repeat(5 - r) + '</span>';
    }

    let items = [];

    async function loadItems() {
      const tbody = document.getElementById('rows');
      tbody.innerHTML = `<tr><td colspan="6" class="empty-state">Loading…</td></tr>`;
      try {
        const res = await fetch('/api/testimonials', { headers: authHeaders() });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        items = Array.isArray(data) ? data : (data.items || []);
        renderRows();
      } catch (err) {
        console.error(err);
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">⚠️ Failed to load testimonials: ${escapeHTML(err.message)}</td></tr>`;
        toast('Failed to load testimonials', 'error');
      }
    }

    function renderRows() {
      const tbody = document.getElementById('rows');
      if (!items.length) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state">
          <div class="icon">⭐</div>
          <p>No testimonials yet. Click <strong>Add Testimonial</strong> to create your first one.</p>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = items.map(t => `
        <tr>
          <td>
            <strong>${escapeHTML(t.clientName)}</strong>
            ${t.clientTitle ? `<div style="font-size:12px;color:var(--text-muted);">${escapeHTML(t.clientTitle)}</div>` : ''}
          </td>
          <td>${escapeHTML(t.company || '—')}</td>
          <td><div class="quote">${escapeHTML(t.text || '')}</div></td>
          <td><div class="stars">${stars(t.rating)}</div></td>
          <td><span class="pill ${t.featured ? 'yes' : 'no'}">${t.featured ? 'Yes' : 'No'}</span></td>
          <td>
            <div class="actions-cell">
              <button class="btn btn-secondary btn-sm" data-action="edit" data-id="${t._id}">Edit</button>
              <button class="btn btn-danger btn-sm" data-action="delete" data-id="${t._id}">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');

      tbody.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          if (btn.dataset.action === 'edit') openEditModal(id);
          else if (btn.dataset.action === 'delete') deleteItem(id);
        });
      });
    }

    function openAddModal() {
      document.getElementById('modal-title').textContent = 'Add Testimonial';
      document.getElementById('f-id').value = '';
      document.getElementById('f-clientName').value = '';
      document.getElementById('f-clientTitle').value = '';
      document.getElementById('f-company').value = '';
      document.getElementById('f-text').value = '';
      document.getElementById('f-rating').value = 5;
      document.getElementById('f-featured').checked = false;
      hideError();
      document.getElementById('modal-backdrop').classList.add('open');
    }

    function openEditModal(id) {
      const t = items.find(x => x._id === id);
      if (!t) return;
      document.getElementById('modal-title').textContent = 'Edit Testimonial';
      document.getElementById('f-id').value = t._id;
      document.getElementById('f-clientName').value = t.clientName || '';
      document.getElementById('f-clientTitle').value = t.clientTitle || '';
      document.getElementById('f-company').value = t.company || '';
      document.getElementById('f-text').value = t.text || '';
      document.getElementById('f-rating').value = t.rating || 5;
      document.getElementById('f-featured').checked = !!t.featured;
      hideError();
      document.getElementById('modal-backdrop').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-backdrop').classList.remove('open');
    }

    function showError(msg) {
      const el = document.getElementById('form-error');
      el.textContent = msg; el.classList.add('show');
    }
    function hideError() {
      document.getElementById('form-error').classList.remove('show');
    }

    async function saveItem(e) {
      e.preventDefault();
      hideError();
      const id = document.getElementById('f-id').value;
      const ratingNum = parseInt(document.getElementById('f-rating').value, 10);
      const payload = {
        clientName: document.getElementById('f-clientName').value.trim(),
        clientTitle: document.getElementById('f-clientTitle').value.trim(),
        company: document.getElementById('f-company').value.trim(),
        text: document.getElementById('f-text').value,
        rating: Number.isFinite(ratingNum) ? Math.max(1, Math.min(5, ratingNum)) : 5,
        featured: document.getElementById('f-featured').checked
      };
      if (!payload.clientName) { showError('Client name is required.'); return; }
      if (!payload.text.trim()) { showError('Testimonial text is required.'); return; }

      const url = id ? `/api/testimonials?id=${encodeURIComponent(id)}` : '/api/testimonials';
      const method = id ? 'PUT' : 'POST';
      const btn = document.getElementById('btn-save');
      btn.disabled = true;
      try {
        const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(payload) });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) {
          throw new Error(data.message || `HTTP ${res.status}`);
        }
        toast(id ? 'Testimonial updated' : 'Testimonial created');
        closeModal();
        await loadItems();
      } catch (err) {
        console.error(err);
        showError(err.message);
        toast('Save failed', 'error');
      } finally {
        btn.disabled = false;
      }
    }

    async function deleteItem(id) {
      const t = items.find(x => x._id === id);
      if (!confirm(`Delete testimonial from "${t ? t.clientName : 'this client'}"? This cannot be undone.`)) return;
      try {
        const res = await fetch(`/api/testimonials?id=${encodeURIComponent(id)}`, {
          method: 'DELETE', headers: authHeaders()
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || data.success === false) throw new Error(data.message || `HTTP ${res.status}`);
        toast('Testimonial deleted');
        await loadItems();
      } catch (err) {
        console.error(err);
        toast('Delete failed: ' + err.message, 'error');
      }
    }

    document.getElementById('btn-add').addEventListener('click', openAddModal);
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('modal-close').addEventListener('click', closeModal);
    document.getElementById('modal-backdrop').addEventListener('click', (e) => {
      if (e.target.id === 'modal-backdrop') closeModal();
    });
    document.getElementById('testimonial-form').addEventListener('submit', saveItem);

    document.getElementById('btn-logout').addEventListener('click', () => {
      localStorage.removeItem('adminToken');
      window.location.href = 'index.html';
    });
    document.getElementById('hamburger-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('active');
    });

    loadItems();
  </script>
</body>
</html>
